spring:
  datasource:
    url: jdbc:mariadb://127.0.0.1:3306/securecapita
    password: password
    username: root
  jpa:
#    database-platform: org.hibernate.dialect.MariaInnoDBDialect "not of use"
    generate-ddl: true
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        globally_quoted_identifiers: true
        dialect: org.hibernate.dialect.MariaDBDialect #       This property typically takes precedence over spring.jpa
        format_sql: true
  sql:
    init:
      mode: always
      continue-on-error: false
